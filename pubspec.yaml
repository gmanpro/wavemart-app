name: wavemart
description: WaveMart - Ethiopia's Premier Real Estate Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  flutter_hooks: ^0.20.4
  
  # Navigation
  go_router: ^13.0.0
  
  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # Forms & Validation
  formz: ^0.7.0
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  path_provider: ^2.1.2
  
  # Device Features
  permission_handler: ^11.0.0
  flutter_native_splash: ^2.4.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
